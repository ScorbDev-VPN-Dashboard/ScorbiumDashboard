{% extends "web/base.html" %}

{% block title %}Вход — {{ app_name }}{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card-glass p-4 p-md-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-telegram" style="font-size: 4rem; color: #0088cc;"></i>
                        <h2 class="fw-bold mt-3">Вход через Telegram</h2>
                        <p style="color: var(--text-muted);">Быстрая и безопасная авторизация без паролей</p>
                    </div>
                    
                    <div class="text-center mb-4">
                        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                            data-telegram-login="{{ bot_username or 'bot' }}" 
                            data-size="large" 
                            data-auth-url="/auth/telegram" 
                            data-request-access="write"></script>
                    </div>
                    
                    <div class="alert" style="background: rgba(0, 212, 170, 0.1); border: 1px solid rgba(0, 212, 170, 0.2); color: var(--accent);">
                        <i class="bi bi-info-circle me-2"></i>
                        Мы не получаем доступ к вашим сообщениям. Только базовую информацию профиля.
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="/" class="text-decoration-none" style="color: var(--text-muted);">
                            <i class="bi bi-arrow-left me-1"></i>Вернуться на главную
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
