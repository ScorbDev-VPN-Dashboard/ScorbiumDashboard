{% extends "base.html" %}
{% block title %}Серверы — {{ app_name }}{% endblock %}
{% block page_title %}Серверы / Ноды{% endblock %}

{% block content %}
<div class="mb-4 fade-in">
  <h4 class="mb-1" style="color:var(--text)">VPN ноды</h4>
  <p class="mb-0" style="color:var(--text-muted);font-size:.85rem">Управление серверами</p>
</div>

<div hx-get="/panel/nodes/data" hx-trigger="load, every 30s" hx-swap="outerHTML">
  <div class="text-center py-5 fade-in">
    <div class="spinner-border" style="color:var(--accent);width:1.5rem;height:1.5rem;border-width:.15rem" role="status"></div>
    <p class="mt-2" style="color:var(--text-muted);font-size:.8rem">Загрузка нод...</p>
  </div>
</div>
{% endblock %}
