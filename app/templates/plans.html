{% extends "base.html" %}
{% block title %}Тарифы — VPN Panel{% endblock %}
{% block page_title %}Тарифы{% endblock %}

{% block content %}
<div class="d-flex justify-content-end mb-3">
  <button class="btn btn-accent btn-sm px-3" data-bs-toggle="modal" data-bs-target="#planModal" onclick="openCreateModal()">
    <i class="bi bi-plus-lg me-1"></i>Новый тариф
  </button>
</div>

<div id="plans-grid">
  {% include "partials/plans_grid.html" %}
</div>

<!-- Plan modal -->
<div class="modal fade" id="planModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:#1a1a2e;border:1px solid rgba(255,255,255,.08)">
      <div class="modal-header border-0 pb-0">
        <h6 class="modal-title text-white" id="planModalTitle">Новый тариф</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="planForm"
            hx-post="/panel/plans"
            hx-target="#plans-grid"
            hx-swap="innerHTML"
            hx-on::after-request="onPlanSaved(event)">
        <div class="modal-body">
          <input type="hidden" id="plan-id" name="plan_id" value="" />
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Название</label>
              <input type="text" name="name" class="form-control" placeholder="1 месяц" value="1 месяц" required />
            </div>
            <div class="col-6">
              <label class="form-label">Цена (₽)</label>
              <input type="number" name="price" class="form-control" placeholder="100" value="100" min="1" step="0.01" required />
            </div>
            <div class="col-6">
              <label class="form-label">Дней</label>
              <input type="number" name="duration_days" class="form-control" placeholder="30" value="30" min="1" required />
            </div>
            <div class="col-12">
              <label class="form-label">Описание <span style="color:#8892a4;font-weight:400">(необязательно)</span></label>
              <input type="text" name="description" class="form-control" placeholder="Базовый доступ" />
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Отмена</button>
          <button type="submit" class="btn btn-accent btn-sm px-4">Сохранить</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function openCreateModal() {
    const form = document.getElementById('planForm');
    form.reset();
    form.querySelector('[name=name]').value = '1 месяц';
    form.querySelector('[name=price]').value = '100';
    form.querySelector('[name=duration_days]').value = '30';
    document.getElementById('plan-id').value = '';
    document.getElementById('planModalTitle').textContent = 'Новый тариф';
    form.setAttribute('hx-post', '/panel/plans');
    htmx.process(form);
  }

  function openEditModal(id, name, days, price, desc) {
    const form = document.getElementById('planForm');
    document.getElementById('planModalTitle').textContent = 'Изменить тариф';
    document.getElementById('plan-id').value = id;
    form.querySelector('[name=name]').value = name;
    form.querySelector('[name=price]').value = price;
    form.querySelector('[name=duration_days]').value = days;
    form.querySelector('[name=description]').value = desc || '';
    form.setAttribute('hx-post', `/panel/plans/${id}/edit`);
    htmx.process(form);
    new bootstrap.Modal(document.getElementById('planModal')).show();
  }

  function onPlanSaved(e) {
    if (e.detail.successful) {
      bootstrap.Modal.getInstance(document.getElementById('planModal'))?.hide();
    }
  }
</script>
{% endblock %}
