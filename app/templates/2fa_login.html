<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA — {{ app_name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#0f1117; }
    .auth-card { background:#1a1d2e; border:1px solid rgba(255,255,255,.08); border-radius:20px; padding:2.5rem; width:100%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
    .auth-title { color:#fff; font-size:1.3rem; font-weight:700; margin-bottom:.3rem; }
    .auth-subtitle { color:#6b7280; font-size:.85rem; margin-bottom:1.5rem; }
    .code-input { font-size:1.5rem; letter-spacing:6px; text-align:center; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.1); border-radius:12px; color:#fff; padding:.8rem; }
    .code-input:focus { border-color:#00d4aa; box-shadow:0 0 0 3px rgba(0,212,170,.15); outline:none; }
    .btn-2fa { background:#00d4aa; color:#000; font-weight:600; border:none; border-radius:12px; padding:.7rem; }
    .btn-2fa:hover { background:#00b894; }
    .error-msg { color:#ef4444; font-size:.85rem; margin-top:.5rem; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="mb-3" style="font-size:2.5rem"><i class="bi bi-shield-lock" style="color:#00d4aa"></i></div>
      <div class="auth-title">Двухфакторная аутентификация</div>
      <div class="auth-subtitle">Введите 6-значный код из приложения</div>
    </div>
    {% if error %}
    <div class="error-msg text-center mb-3"><i class="bi bi-x-circle me-1"></i>{{ error }}</div>
    {% endif %}
    <form method="POST" action="/panel/2fa-login">
      <input type="text" name="code" class="form-control code-input mb-3" maxlength="6" placeholder="000000" inputmode="numeric" pattern="[0-9]*" autofocus required />
      <button type="submit" class="btn btn-2fa w-100"><i class="bi bi-unlock me-1"></i>Войти</button>
    </form>
    <div class="text-center mt-3">
      <a href="/panel/logout" class="text-decoration-none" style="color:#6b7280;font-size:.8rem">← Вернуться к входу</a>
    </div>
  </div>
  <script>
    document.querySelector('input[name="code"]').addEventListener('input', function(e) {
      if (this.value.length === 6) this.form.submit();
    });
  </script>
</body>
</html>
