<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — {{ app_name | default('VPN Panel') }}</title>
  <link rel="shortcut icon" href="/static/img/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body {
      background: radial-gradient(ellipse at 60% 0%, rgba(108,99,255,.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 0% 80%, rgba(167,139,250,.08) 0%, transparent 50%),
                  #080812;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-wrap {
      width: 100%; max-width: 400px; padding: 1rem;
    }
    .login-card {
      background: #10101e;
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
    }
    .logo-block {
      display: flex; flex-direction: column; align-items: center; margin-bottom: 1.75rem;
    }
    .logo-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: .75rem;
      box-shadow: 0 8px 32px rgba(108,99,255,.4);
    }
    .logo-icon img { width: 36px; height: 36px; filter: brightness(0) invert(1); }
    .logo-icon i { font-size: 1.8rem; color: #fff; }
    .app-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: .2rem; }
    .app-sub { font-size: .78rem; color: #8892a4; }
    .form-control {
      background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.1);
      color: #c8d0e0; border-radius: 10px; padding: .6rem .9rem;
    }
    .form-control:focus {
      background: rgba(255,255,255,.06); border-color: #6c63ff;
      color: #fff; box-shadow: 0 0 0 3px rgba(108,99,255,.2);
    }
    .form-control::placeholder { color: #4a5568; }
    .input-group-text {
      background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.1);
      color: #8892a4; border-radius: 10px 0 0 10px;
    }
    .input-group .form-control { border-radius: 0 10px 10px 0; }
    .btn-login {
      background: linear-gradient(135deg, #6c63ff, #574fd6);
      border: none; color: #fff; font-weight: 600;
      border-radius: 10px; padding: .65rem;
      letter-spacing: .3px; transition: all .2s;
      box-shadow: 0 4px 16px rgba(108,99,255,.35);
    }
    .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,.5); color: #fff; }
    .version-badge {
      display: inline-block; padding: .15rem .5rem; border-radius: 20px;
      background: rgba(108,99,255,.15); color: #a78bfa;
      font-size: .65rem; font-weight: 600; letter-spacing: .5px;
      border: 1px solid rgba(108,99,255,.2);
    }
    .form-label { font-size: .78rem; color: #8892a4; margin-bottom: .35rem; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-block">
        <div class="app-name">{{ app_name | default('VPN Panel') }}</div>
        <div class="app-sub">
          Панель управления
          <span class="version-badge ms-1">v{{ app_version | default('1.0.0') }}</span>
        </div>
      </div>

      {% if error %}
      <div class="alert py-2 px-3 mb-3" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;font-size:.82rem;color:#fca5a5">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" action="/panel/login">
        <div class="mb-3">
          <label class="form-label">Логин</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus />
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Пароль</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>
        <button type="submit" class="btn btn-login w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Войти в панель
        </button>
      </form>

      <div class="text-center mt-4" style="font-size:.7rem;color:#4a5568">
        Защищённый доступ · Только для администраторов
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
