<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>{{ app_name }}</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--a:#00d4aa;--a2:#0ea5e9;--a3:rgba(0,212,170,.15);--r:16px;--rs:10px;--tr:.18s cubic-bezier(.4,0,.2,1)}
.dark{--bg:#0d0d1a;--bg2:#13132a;--bg3:#1a1a35;--tx:#e8eaf0;--hi:#7a849a;--br:rgba(255,255,255,.07);--sh:0 4px 24px rgba(0,0,0,.4)}
.light{--bg:#f0f2f8;--bg2:#fff;--bg3:#e8eaf0;--tx:#1a1a2e;--hi:#6b7280;--br:rgba(0,0,0,.07);--sh:0 4px 24px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.scr{display:none;padding:16px 16px 96px;max-width:520px;margin:0 auto;animation:fi .2s ease}
.scr.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.nav{display:flex;background:var(--bg2);border-top:1px solid var(--br);position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);backdrop-filter:blur(12px)}
.nb{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;color:var(--hi);font-size:10px;font-weight:600;border:none;background:none;transition:color var(--tr);position:relative}
.nb.on{color:var(--a)}.nb.on::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--a);border-radius:2px 2px 0 0}
.nb svg{display:block;margin:0 auto 3px;width:22px;height:22px;transition:transform var(--tr)}.nb.on svg{transform:scale(1.1)}
.card{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:12px;border:1px solid var(--br);box-shadow:var(--sh)}
.hero{background:linear-gradient(135deg,#00d4aa,#0ea5e9,#c084fc);border-radius:var(--r);padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.sl2{font-size:11px;color:var(--hi);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:16px 0 8px}
.btn{display:block;width:100%;padding:14px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;cursor:pointer;transition:opacity var(--tr),transform var(--tr);text-align:center}
.btn:active{opacity:.85;transform:scale(.97)}.bp{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;box-shadow:0 4px 16px rgba(0,212,170,.35)}.bo{background:transparent;border:1.5px solid var(--a);color:var(--a)}.bs{padding:10px 18px;font-size:13px;border-radius:var(--rs);display:inline-block;width:auto}
.bi{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;background:var(--bg3);color:var(--tx);font-size:16px;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}.ba{background:rgba(34,197,94,.15);color:#22c55e}.be{background:rgba(239,68,68,.12);color:#ef4444}
.sr{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--br)}.sr:last-child{border-bottom:none}.sr-label{font-size:13px;color:var(--hi)}.sr-val{font-size:14px;font-weight:600}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-top:4px}.pt{font-size:22px;font-weight:800}
.av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;position:relative;overflow:hidden;border:2px solid rgba(0,212,170,.4);box-shadow:0 0 0 4px rgba(0,212,170,.15),0 4px 16px rgba(0,0,0,.25);animation:avGlow 3s ease-in-out infinite}.av img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;animation:avFade .4s ease}@keyframes avGlow{0%,100%{box-shadow:0 0 0 4px rgba(0,212,170,.15),0 4px 16px rgba(0,0,0,.25)}50%{box-shadow:0 0 0 6px rgba(0,212,170,.25),0 4px 20px rgba(0,212,170,.15)}}@keyframes avFade{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.pc{background:var(--bg2);border-radius:var(--r);padding:16px;margin-bottom:10px;border:1.5px solid var(--br);cursor:pointer;transition:border-color var(--tr),transform var(--tr);position:relative;overflow:hidden}.pc:active{transform:scale(.98)}.pc.sel{border-color:var(--a);background:var(--a3);box-shadow:0 0 0 3px rgba(0,212,170,.12)}.pc.sel::before{content:'✓';position:absolute;top:12px;right:14px;width:22px;height:22px;border-radius:50%;background:var(--a);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}.pn{font-size:16px;font-weight:700;margin-bottom:4px}.pp{font-size:26px;font-weight:800;color:var(--a)}.pd{font-size:12px;color:var(--hi);margin-top:5px}
.kc{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:10px;border:1px solid var(--br)}.kc.active-key{border-left:3px solid #22c55e}.kn{font-size:15px;font-weight:700;margin-bottom:4px}.ke{font-size:12px;color:var(--hi);margin-bottom:8px}.ku{font-size:11px;color:var(--a);word-break:break-all;background:var(--a3);padding:10px 12px;border-radius:var(--rs);cursor:pointer;border:1px solid rgba(0,212,170,.2)}
.db{height:4px;background:var(--br);border-radius:2px;margin-top:10px;overflow:hidden}.df{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--a),var(--a2));transition:width .5s ease}
.pb{width:100%;padding:13px 16px;border-radius:var(--rs);border:1.5px solid var(--br);background:var(--bg2);color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;text-align:left;transition:border-color var(--tr),transform var(--tr);margin-bottom:8px;display:flex;align-items:center;gap:12px}.pb:active{transform:scale(.98);border-color:var(--a)}.pb-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rb{background:var(--a3);border-radius:var(--rs);padding:12px 14px;border:1px solid rgba(0,212,170,.2)}.rl{font-size:12px;color:var(--a);word-break:break-all;font-weight:500}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.stat-item{background:var(--bg2);border-radius:var(--rs);padding:14px;border:1px solid var(--br);text-align:center}.stat-val{font-size:22px;font-weight:800;color:var(--a)}.stat-lbl{font-size:11px;color:var(--hi);margin-top:2px;font-weight:600}
.ld{text-align:center;padding:56px 16px;color:var(--hi)}.ls{width:36px;height:36px;border:3px solid var(--br);border-top-color:var(--a);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px}@keyframes sp{to{transform:rotate(360deg)}}
.em{text-align:center;padding:48px 16px;color:var(--hi)}.ei{font-size:52px;margin-bottom:12px}.em-title{font-size:16px;font-weight:700;color:var(--tx);margin-bottom:6px}.em-sub{font-size:13px;margin-bottom:20px}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-8px);background:#22c55e;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}.toast.err{background:#ef4444}.toast.info{background:var(--a)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}.chip-ok{background:rgba(34,197,94,.12);color:#22c55e}.chip-warn{background:rgba(234,179,8,.12);color:#eab308}.chip-danger{background:rgba(239,68,68,.12);color:#ef4444}
.div{height:1px;background:var(--br);margin:12px 0}
.offline-bar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#ef4444;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;transform:translateY(-100%);transition:transform .3s ease}.offline-bar.on{transform:translateY(0)}
.skel{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:200% 100%;animation:skel 1.2s infinite;border-radius:8px}@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}.modal-overlay.on{display:flex}
.modal{background:var(--bg2);border-radius:var(--r);padding:20px;width:100%;max-width:400px;border:1px solid var(--br);box-shadow:var(--sh);animation:fi .2s ease}.modal-title{font-size:18px;font-weight:800;margin-bottom:12px}
.modal-input{width:100%;padding:12px;border-radius:var(--rs);border:1.5px solid var(--br);background:var(--bg);color:var(--tx);font-size:15px;margin-bottom:12px;transition:border-color var(--tr)}.modal-input:focus{outline:none;border-color:var(--a)}.modal-input::placeholder{color:var(--hi)}
.promo-row{display:flex;gap:8px;margin-bottom:12px}.promo-row .modal-input{flex:1;margin-bottom:0}
.faq-item{background:var(--bg2);border-radius:var(--rs);padding:14px;margin-bottom:8px;border:1px solid var(--br);cursor:pointer;transition:background var(--tr)}.faq-item:active{background:var(--bg3)}.faq-q{font-size:14px;font-weight:700;color:var(--tx);display:flex;justify-content:space-between;align-items:center}.faq-a{font-size:13px;color:var(--hi);margin-top:8px;line-height:1.5;display:none}.faq-item.open .faq-a{display:block}.faq-icon{transition:transform var(--tr)}.faq-item.open .faq-icon{transform:rotate(180deg)}
.srv-item{background:var(--bg2);border-radius:var(--rs);padding:14px;margin-bottom:8px;border:1px solid var(--br);display:flex;align-items:center;gap:12px}.srv-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;box-shadow:0 0 8px #22c55e;animation:pulse 2s infinite}.srv-dot.warn{background:#eab308;box-shadow:0 0 8px #eab308}.srv-dot.off{background:#ef4444;box-shadow:0 0 8px #ef4444}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.guide-step{display:flex;gap:12px;margin-bottom:16px}.guide-num{width:28px;height:28px;border-radius:50%;background:var(--a);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}.guide-text{flex:1}.guide-title{font-size:14px;font-weight:700;margin-bottom:2px}.guide-desc{font-size:12px;color:var(--hi)}
.ptr{position:fixed;top:0;left:0;right:0;z-index:90;text-align:center;padding:12px;font-size:13px;color:var(--hi);opacity:0;transition:opacity .2s;pointer-events:none;background:var(--bg)}.ptr.show{opacity:1}
</style>
</head>
<body class="dark">
<div class="offline-bar" id="offlineBar">⚠️ Нет подключения к интернету</div>

<!-- HOME -->
<div id="s-home" class="scr on">
<div class="ph"><div class="pt" id="app-title">{{ app_name }}</div><button class="bi" onclick="toggleTheme()" id="tbtn">🌙</button></div>
<div id="home-c"><div class="ld"><div class="ls"></div></div></div>
<div id="srv-status" style="display:none;margin-bottom:12px"></div>
</div>

<!-- SUBS -->
<div id="s-subs" class="scr">
<div class="ph"><div class="pt">🔑 Подписки</div></div>
<div id="subs-c"><div class="ld"><div class="ls"></div></div></div>
</div>

<!-- BUY -->
<div id="s-buy" class="scr">
<div class="ph"><div class="pt">💳 Купить</div></div>
<div id="buy-c"><div class="ld"><div class="ls"></div></div></div>
</div>

<!-- PROFILE -->
<div id="s-profile" class="scr">
<div class="ph"><div class="pt">👤 Профиль</div></div>
<div id="profile-c"><div class="ld"><div class="ls"></div></div></div>
</div>

<!-- HELP -->
<div id="s-help" class="scr">
<div class="ph"><div class="pt">❓ Помощь</div></div>
<div id="help-c"><div class="ld"><div class="ls"></div></div></div>
</div>

<!-- ADMIN -->
<div id="s-admin" class="scr">
<div class="ph"><div class="pt">👑 Админ</div></div>
<div id="admin-c"><div class="ld"><div class="ls"></div></div></div>
</div>

<!-- NAV -->
<nav class="nav">
<button class="nb on" onclick="go('home')" id="n-home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Главная</button>
<button class="nb" onclick="go('subs')" id="n-subs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Подписки</button>
<button class="nb" onclick="go('buy')" id="n-buy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>Купить</button>
<button class="nb" onclick="go('profile')" id="n-profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</button>
<button class="nb" onclick="go('help')" id="n-help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Помощь</button>
<button class="nb" onclick="go('admin')" id="n-admin" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Админ</button>
</nav>

<!-- PROMO MODAL -->
<div class="modal-overlay" id="pm" onclick="if(event.target===this)closePromo()">
<div class="modal"><div class="modal-title">🎁 Активировать промокод</div><div class="promo-row"><input class="modal-input" id="pi" placeholder="Введите код..." maxlength="32"><button class="btn bp bs" onclick="applyPromo()">OK</button></div><p style="font-size:12px;color:var(--hi)">Введите промокод для получения бонусов</p></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<!-- PULL INDICATOR -->
<div class="ptr" id="ptr">🔄 Обновление...</div>

<script src="/static/js/miniapp.js"></script>
</body>
</html>
