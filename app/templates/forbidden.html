<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Доступ запрещён — {{ app_name | default('VPN Panel') }}</title>
  <link rel="shortcut icon" href="/static/img/favicon.ico" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    :root {
      --accent: #00d4aa;
      --accent-secondary: #0ea5e9;
      --bg: #070b14;
      --bg-elevated: #0d1117;
      --surface: #131820;
      --border: rgba(148, 163, 184, 0.08);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --danger: #ef4444;
    }
    body {
      background: radial-gradient(ellipse at 60% 0%, rgba(0, 212, 170, .08) 0%, transparent 50%),
                  radial-gradient(ellipse at 0% 100%, rgba(14, 165, 233, .05) 0%, transparent 40%),
                  var(--bg);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif; -webkit-font-smoothing: antialiased;
    }
    .forbidden-wrap { width: 100%; max-width: 440px; padding: 1rem; text-align: center; }
    .forbidden-card {
      background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 20px;
      padding: 3rem 2rem;
      box-shadow: 0 24px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(0,212,170,.05);
      position: relative; overflow: hidden;
    }
    .forbidden-card::before {
      content: ''; position: absolute; top: -50%; right: -30%;
      width: 300px; height: 300px; border-radius: 50%;
      background: radial-gradient(circle, rgba(239,68,68,.06), transparent 70%);
      pointer-events: none;
    }
    .forbidden-icon {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(239,68,68,.1);
      border: 2px solid rgba(239,68,68,.2);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2.2rem; color: var(--danger);
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(239,68,68,.2);
    }
    .forbidden-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: .5rem; }
    .forbidden-text { font-size: .95rem; color: var(--text-secondary); margin-bottom: 2rem; line-height: 1.6; }
    .btn-back {
      background: linear-gradient(135deg, var(--accent), #0d9488); border: none; color: #fff;
      font-weight: 600; border-radius: 12px; padding: .7rem 1.5rem;
      transition: all .2s; box-shadow: 0 4px 16px rgba(0,212,170,.3);
      text-decoration: none; display: inline-flex; align-items: center; gap: .5rem;
    }
    .btn-back:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,212,170,.45); filter: brightness(1.1); color: #fff; }
    .code-badge {
      display: inline-block; padding: .2rem .6rem; border-radius: 8px;
      background: rgba(239,68,68,.08); color: var(--danger);
      font-size: .75rem; font-weight: 700; font-family: 'JetBrains Mono', monospace;
      border: 1px solid rgba(239,68,68,.15); margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="forbidden-wrap">
    <div class="forbidden-card">
      <div class="code-badge">403 Forbidden</div>
      <div class="forbidden-icon"><i class="bi bi-shield-exclamation"></i></div>
      <div class="forbidden-title">Недостаточно прав</div>
      <div class="forbidden-text">
        У вашей учётной записи нет доступа к этому разделу.<br>
        Обратитесь к администратору, если вам нужен доступ.
      </div>
      <a href="/panel/" class="btn-back">
        <i class="bi bi-arrow-left"></i>Вернуться на дашборд
      </a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
