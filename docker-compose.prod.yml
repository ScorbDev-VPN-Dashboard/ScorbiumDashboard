services:
  db:
    image: postgres:15-alpine
    container_name: vpn_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-vpnbot}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vpn_net

  app:
    build: .
    container_name: vpn_app
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/healthy"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vpn_net

  nginx:
    image: nginx:alpine
    container_name: vpn_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - vpn_net

  certbot:
    image: certbot/certbot
    container_name: vpn_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    networks:
      - vpn_net

networks:
  vpn_net:
    driver: bridge

volumes:
  db_data:
  certbot_www:
