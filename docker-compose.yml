services:
  db:
    image: postgres:15
    container_name: vpn_dashboard_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mydb}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - networkName

networks:
  networkName:
    driver: bridge

volumes:
  db_data:
  